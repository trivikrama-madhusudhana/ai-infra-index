# Domain -> tier allowlist. Tier is COMPUTED from this file, never judged by an agent.
#
#   Tier A  primary / official / regulatory: the entity itself, its named
#           infrastructure partners speaking on record, and government/utility filings.
#   Tier B  reputable independent press and specialist research trackers.
#   Tier C  weaker secondary coverage, recorded but NOT eligible for scoring.
#   (any domain not listed) -> Tier D -> excluded from scoring, flagged by CI.
#
# Matching is by host suffix: a fact URL host matches a domain if it equals the
# domain or ends with ".<domain>" (so blogs.microsoft.com matches microsoft.com).
# Add domains here; never let an agent invent a tier.

version: 1

tiers:
  A:
    # Frontier labs (own newsrooms / blogs)
    - openai.com
    - anthropic.com
    - google.com
    - blog.google
    - deepmind.google
