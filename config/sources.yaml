    - interconnection.fyi
    # China-focused English press (owner decision 2026-07-20: scoreable Tier B
    # for Chinese labs; flag translation uncertainty in each fact's `notes`).
    - scmp.com
    - technode.com
    - pandaily.com
    - caixinglobal.com
    - yicaiglobal.com
    - 36kr.com
    - chinatalk.media
